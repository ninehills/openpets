name: Release desktop binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build/upload, e.g. v0.1.0"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            command: bun run package:mac
          - name: Windows x64
            os: windows-latest
            command: bun run package:win
          - name: Linux x64
            os: ubuntu-latest
            command: bun run package:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools fakeroot rpm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        if: runner.os != 'Windows'
        run: bun run test

      - name: Typecheck
        run: bun run typecheck

      - name: Package desktop
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openpets-${{ matrix.name }}
          path: |
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.exe
            release/desktop/*.AppImage
            release/desktop/*.deb

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: OpenPets ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/desktop/*.dmg
            release/desktop/*.zip
            release/desktop/*.exe
            release/desktop/*.AppImage
            release/desktop/*.deb
